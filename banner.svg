<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-label="João — Web Developer · Fractal Studio">
  <style>
    @keyframes nameIn {
      0%   { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineExpand {
      0%   { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    @keyframes subIn {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 0.45; transform: translateY(0); }
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }
    @keyframes squareIn {
      0%   { opacity: 0; transform: rotate(var(--r)) scale(0.8); }
      100% { opacity: var(--o); transform: rotate(var(--r)) scale(1); }
    }
    @keyframes gemGlow {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 1; }
    }
    @keyframes tagIn {
      0%   { opacity: 0; }
      100% { opacity: 0.2; }
    }

    .name {
      animation: nameIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    .accent-line {
      transform-origin: left center;
      animation: lineExpand 0.8s cubic-bezier(0.16,1,0.3,1) 0.65s both;
    }
    .sub {
      animation: subIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.9s both;
    }
    .sq1 {
      --r: 0deg; --o: 0.05;
      transform-box: fill-box;
      transform-origin: center;
      animation: squareIn 1s cubic-bezier(0.16,1,0.3,1) 0.4s both;
    }
    .sq2 {
      --r: 18deg; --o: 0.08;
      transform-box: fill-box;
      transform-origin: center;
      animation: squareIn 1s cubic-bezier(0.16,1,0.3,1) 0.55s both;
    }
    .sq3 {
      --r: 36deg; --o: 0.12;
      transform-box: fill-box;
      transform-origin: center;
      animation: squareIn 1s cubic-bezier(0.16,1,0.3,1) 0.7s both;
    }
    .sq4 {
      --r: 54deg; --o: 0.22;
      transform-box: fill-box;
      transform-origin: center;
      animation: squareIn 1s cubic-bezier(0.16,1,0.3,1) 0.85s both;
    }
    .gem {
      animation: gemGlow 3s ease-in-out 1.4s infinite;
    }
    .tag {
      animation: tagIn 1s ease 1.2s both;
    }
    .dot {
      animation: dotPulse 2.4s ease-in-out infinite;
    }
  </style>

  <rect width="1200" height="260" fill="#050505"/>

  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <clipPath id="clip">
      <rect width="1200" height="260"/>
    </clipPath>
  </defs>

  <g opacity="0.035" clip-path="url(#clip)">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff"/>
    </pattern>
    <rect width="750" height="260" fill="url(#dots)"/>
  </g>

  <rect x="0" y="0" width="1200" height="1" fill="#1a1a1a"/>

  <rect x="0" y="259" width="1200" height="1" fill="#1a1a1a"/>

  <rect class="sq1" x="824" y="14" width="232" height="232"
        fill="none" stroke="#ffffff" stroke-width="1"/>

  <rect class="sq2" x="857" y="47" width="166" height="166"
        fill="none" stroke="#ffffff" stroke-width="1"
        transform="rotate(18, 940, 130)"/>

  <rect class="sq3" x="890" y="80" width="100" height="100"
        fill="none" stroke="#ffffff" stroke-width="1"
        transform="rotate(36, 940, 130)"/>

  <rect class="sq4" x="907" y="97" width="66" height="66"
        fill="none" stroke="#00D4FF" stroke-width="1"
        transform="rotate(54, 940, 130)"/>

  <rect class="gem" x="924" y="114" width="32" height="32"
        fill="#00D4FF" opacity="0.85"
        transform="rotate(45, 940, 130)"/>

  <text class="tag" x="1080" y="200"
        font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace"
        font-size="10" fill="#00D4FF" letter-spacing="3"
        text-anchor="middle">FRACTAL STUDIO</text>

  <text class="name" x="60" y="152"
        font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="108" font-weight="800" fill="#ffffff"
        letter-spacing="-3">JOÃO</text>

  <rect class="accent-line" x="60" y="168" width="340" height="2.5" fill="#00D4FF" rx="1.25"/>

  <circle class="dot" cx="416" cy="169" r="2.5" fill="#00D4FF"/>

  <text class="sub" x="60" y="205"
        font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace"
        font-size="13" fill="#ffffff" letter-spacing="4">
    WEB DEVELOPER · FRACTAL STUDIO · JOINVILLE, BRAZIL
  </text>
</svg>
